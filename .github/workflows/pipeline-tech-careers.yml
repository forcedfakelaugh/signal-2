name: Pipeline — Niche A (Tech Careers)

on:
  schedule:
    # Runs daily at 01:00 UTC (08:00 ICT) — adjust for your timezone
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      max_videos:
        description: "Max videos to collect per channel"
        required: false
        default: "2"

jobs:
  run-pipeline:
    name: Run pipeline for niche-a
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # ── Credentials (GitHub Secrets only) ───────────────────────────
      DATABASE_URL:   ${{ secrets.NICHE_A_DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      # ── LLM config (not sensitive — edit freely) ──────────────────────
      LLM_BASE_URL:    "https://openrouter.ai/api/v1"
      LLM_MODEL_FAST:  "deepseek/deepseek-chat-v3-0324:free"
      LLM_MODEL_SMART: "deepseek/deepseek-chat-v3-0324"

      # ── Niche config (not sensitive — edit freely) ────────────────────
      NICHE_LABEL: "tech-careers"

      YOUTUBE_CHANNEL_IDS: >
        UC_x5XG1OV2P6uZZ5FSM9Ttw,
        UCVHFbqXqoYvEWM1Ddxl0QDg

      CONTENT_NICHE: >
        software developers, tech workers, or people navigating
        AI's impact on technical careers

      TARGET_AUDIENCE: >
        software engineers and tech workers who are navigating
        AI's impact on their careers and daily work

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Init DB (idempotent)
        run: ai-posts init-db

      - name: Collect from configured channels
        run: |
          MAX_VIDEOS="${{ github.event.inputs.max_videos || '2' }}"
          if [ -n "${YOUTUBE_CHANNEL_IDS}" ]; then
            echo "Collecting from channels: ${YOUTUBE_CHANNEL_IDS}"
            ai-posts collect-channels --max-videos "${MAX_VIDEOS}"
          else
            echo "NICHE_A_YOUTUBE_CHANNEL_IDS is empty — skipping collection."
          fi

      - name: Run full pipeline
        run: ai-posts today

      - name: Show top posts
        run: ai-posts show
