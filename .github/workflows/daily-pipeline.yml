name: Daily Signal Pipeline

on:
  schedule:
    # Runs daily at 13:15 UTC (adjust for your timezone)
    - cron: "15 13 * * *"
  workflow_dispatch:

jobs:
  run-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_CHANNEL_IDS: ${{ secrets.YOUTUBE_CHANNEL_IDS }}
      CONTENT_NICHE: ${{ secrets.CONTENT_NICHE }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LLM_MODEL_FAST: ${{ secrets.LLM_MODEL_FAST }}
      LLM_MODEL_SMART: ${{ secrets.LLM_MODEL_SMART }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Init DB
        run: ai-posts init-db

      - name: Collect from configured channels
        run: |
          if [ -n "${YOUTUBE_CHANNEL_IDS}" ]; then
            ai-posts collect-channels --max-videos 2
          else
            echo "YOUTUBE_CHANNEL_IDS is empty; skipping channel collection."
          fi

      - name: Run pipeline
        run: ai-posts today
