name: Pipeline — Niche B (Badminton)

# on:
#   schedule:
#     # Runs daily at 02:00 UTC (09:00 ICT) — staggered 1h after Niche A to avoid API rate collisions
#     - cron: "0 2 * * *"
#   workflow_dispatch:
#     inputs:
#       max_videos:
#         description: "Max videos to collect per channel"
#         required: false
#         default: "2"

jobs:
  run-pipeline:
    name: Run pipeline for badminton
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # ── Credentials (GitHub Secrets only) ───────────────────────────
      DATABASE_URL:    ${{ secrets.NICHE_B_DATABASE_URL }}
      OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      # ── LLM config (not sensitive — edit freely) ──────────────────────
      LLM_BASE_URL:    "https://openrouter.ai/api/v1"
      LLM_MODEL_FAST:  "deepseek/deepseek-chat-v3-0324:free"
      LLM_MODEL_SMART: "deepseek/deepseek-chat-v3-0324"

      # ── Niche config (not sensitive — edit freely) ────────────────────
      NICHE_LABEL: "badminton"

      YOUTUBE_CHANNEL_IDS: >
        UCnVfEREu3C1_CV_lg3iRAog,
        UCk2gRC4RewYvvXXqXZxaTbQ,
        UCFhzo4Y1bVE8yczq5OMNo2Q,
        UCSVKLOCBHSzXPMwXvUymsTA,
        UCfRMnJ4f02bKXts3OE8eOEw

      CONTENT_NICHE: >
        badminton players, coaches, and enthusiasts focused on
        improving technique, footwork, fitness, and competitive performance

      TARGET_AUDIENCE: >
        recreational and competitive badminton players who want to level up
        their footwork, smash technique, mental game, and match strategy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Init DB (idempotent)
        run: ai-posts init-db

      - name: Collect from configured channels
        run: |
          MAX_VIDEOS="${{ github.event.inputs.max_videos || '2' }}"
          if [ -n "${YOUTUBE_CHANNEL_IDS}" ]; then
            echo "Collecting from channels: ${YOUTUBE_CHANNEL_IDS}"
            ai-posts collect-channels --max-videos "${MAX_VIDEOS}"
          else
            echo "NICHE_B_YOUTUBE_CHANNEL_IDS is empty — skipping collection."
          fi

      - name: Run full pipeline
        run: ai-posts today

      - name: Show top posts
        run: ai-posts show
